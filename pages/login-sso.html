<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In with SSO — NETZSCH Customer Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ─────────────────────────────────────────────── */
    .topbar {
      background: #007167;
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 32px;
      flex-shrink: 0;
    }

    .topbar-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .topbar-icon { width: 16px; height: 16px; object-fit: contain; }

    .topbar-divider {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.3);
    }

    .topbar-label {
      font-size: 16px;
      font-weight: 500;
      color: #fff;
      line-height: 24px;
      letter-spacing: -0.31px;
      white-space: nowrap;
    }

    /* ── MAIN ────────────────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── LEFT PANEL ──────────────────────────────────────────── */
    .panel-left {
      position: relative;
      width: 37.5%;
      overflow: hidden;
    }

    .panel-left-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .panel-left-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right,
        rgba(5,103,100,0.7) 43%,
        rgba(58,124,120,0.74) 56%,
        rgba(125,166,163,0.83) 81%,
        rgba(255,255,255,1) 131%
      );
    }

    .panel-left-content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 32px;
      padding: 0 40px 0 110px;
    }

    .portal-badge {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .portal-badge-icon { width: 40px; height: 40px; object-fit: contain; }

    .portal-badge-text {
      font-size: 24px;
      font-weight: 500;
      color: #fff;
      line-height: 32px;
      letter-spacing: 0.07px;
      white-space: nowrap;
    }

    .panel-left-texts { display: flex; flex-direction: column; gap: 16px; }

    .panel-left-title {
      font-size: 48px;
      font-weight: 500;
      color: #fff;
      line-height: 60px;
      letter-spacing: 0.35px;
      text-align: center;
    }

    .panel-left-subtitle {
      font-size: 24px;
      font-weight: 500;
      color: #fff;
      line-height: 32px;
      letter-spacing: 0.07px;
      max-width: 480px;
      text-align: center;
    }

    /* ── RIGHT PANEL ─────────────────────────────────────────── */
    .panel-right {
      width: 62.5%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 40px;
    }

    .form-wrapper {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .form-logo-icon { width: 40px; height: 40px; object-fit: contain; }

    .form-logo-text {
      font-size: 16px;
      font-weight: 500;
      color: #4c4d57;
      line-height: 24px;
      letter-spacing: -0.31px;
      white-space: nowrap;
    }

    .form-title {
      font-size: 24px;
      font-weight: 500;
      color: #4c4d57;
      line-height: 32px;
      letter-spacing: 0.07px;
      text-align: center;
    }

    /* SSO Buttons */
    .sso-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-sso-provider {
      width: 100%;
      height: 44px;
      background: #d7d9db;
      color: #6b6e73;
      border: none;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 24px;
      letter-spacing: -0.31px;
      cursor: not-allowed;
      opacity: 0.5;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-sso-provider img {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .btn-corporate {
      width: 100%;
      height: 44px;
      background: #007167;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 24px;
      letter-spacing: -0.31px;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-corporate:hover { opacity: 0.9; }

    .btn-corporate img {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .sso-note {
      font-size: 14px;
      font-weight: 500;
      color: #4c4d57;
      line-height: 20px;
      letter-spacing: -0.15px;
      text-align: center;
    }

    .back-link {
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: #007167;
      line-height: 20px;
      letter-spacing: -0.15px;
      text-decoration: none;
    }

    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <a href="home.html" class="topbar-link">
      <img class="topbar-icon" src="https://www.figma.com/api/mcp/asset/8f42afbe-00b4-414a-a514-66e5cd0b621c" alt="">
      <div class="topbar-divider"></div>
      <span class="topbar-label">Grinding &amp; Dispersing Customer Portal</span>
    </a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT -->
    <div class="panel-left">
      <img class="panel-left-bg" src="https://www.figma.com/api/mcp/asset/3610fffd-5d29-44aa-a0a2-bdaa1a22e3b7" alt="">
      <div class="panel-left-overlay"></div>
      <div class="panel-left-content">
        <div class="portal-badge">
          <img class="portal-badge-icon" src="https://www.figma.com/api/mcp/asset/8f42afbe-00b4-414a-a514-66e5cd0b621c" alt="">
          <span class="portal-badge-text">G&amp;D Customer Portal</span>
        </div>
        <div class="panel-left-texts">
          <h1 class="panel-left-title">Welcome back!</h1>
          <p class="panel-left-subtitle">Sign in to your account to continue where you left off and access all your tools.</p>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="panel-right">
      <div class="form-wrapper">

        <!-- Logo -->
        <div class="form-logo">
          <img class="form-logo-icon" src="https://www.figma.com/api/mcp/asset/8f42afbe-00b4-414a-a514-66e5cd0b621c" alt="">
          <span class="form-logo-text">G&amp;D Customer Portal</span>
        </div>

        <!-- Title -->
        <h2 class="form-title">Sign in with your company account</h2>

        <!-- SSO Buttons -->
        <div class="sso-buttons">
          <button class="btn-sso-provider" type="button" disabled>
            <img src="https://www.figma.com/api/mcp/asset/a838058d-dbf2-4fa0-8cc1-25c62692842c" alt="Google">
            Log In with Google
          </button>
          <button class="btn-sso-provider" type="button" disabled>
            <img src="https://www.figma.com/api/mcp/asset/64a2c22c-4714-4936-9787-15c2409576f4" alt="Microsoft">
            Log In with Microsoft
          </button>
          <button class="btn-corporate" type="button" onclick="window.location.href='login-sso-domain.html'">
            <img src="https://www.figma.com/api/mcp/asset/9646fe87-e9c0-4948-89e6-d70d2f756a1e" alt="">
            Corporate Login
          </button>
        </div>

        <!-- Note -->
        <p class="sso-note">You will be redirected to your organization's login page.</p>

        <!-- Back to login -->
        <a href="login.html" class="back-link">Back to Login</a>

      </div>
    </div>
  </div>

</body>
</html>
