<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — NETZSCH Customer Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ─────────────────────────────────────────────── */
    .topbar {
      background: #007167;
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 32px;
      flex-shrink: 0;
    }

    .topbar-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .topbar-icon {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .topbar-divider {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.3);
    }

    .topbar-label {
      font-size: 16px;
      font-weight: 500;
      color: #fff;
      line-height: 24px;
      letter-spacing: -0.31px;
      white-space: nowrap;
    }

    /* ── MAIN LAYOUT ─────────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── LEFT PANEL ──────────────────────────────────────────── */
    .panel-left {
      position: relative;
      width: 50%;
      overflow: hidden;
    }

    .panel-left-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Gradient fades left=teal, right=white */
    .panel-left-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right,
        rgba(5,103,100,0.7) 43%,
        rgba(58,124,120,0.74) 56%,
        rgba(125,166,163,0.83) 81%,
        rgba(255,255,255,1) 131%
      );
    }

    .panel-left-content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 32px;
      padding: 0 40px 0 110px;
    }

    .portal-badge {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .portal-badge-icon {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .portal-badge-text {
      font-size: 24px;
      font-weight: 500;
      color: #fff;
      line-height: 32px;
      letter-spacing: 0.07px;
      white-space: nowrap;
    }

    .panel-left-texts {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-left-title {
      font-size: 48px;
      font-weight: 500;
      color: #fff;
      line-height: 60px;
      letter-spacing: 0.35px;
    }

    .panel-left-subtitle {
      font-size: 24px;
      font-weight: 500;
      color: #fff;
      line-height: 32px;
      letter-spacing: 0.07px;
      max-width: 488px;
      text-align: center;
    }

    /* ── RIGHT PANEL ─────────────────────────────────────────── */
    .panel-right {
      width: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 40px;
    }

    .form-wrapper {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Logo row */
    .form-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .form-logo-icon {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .form-logo-text {
      font-size: 16px;
      font-weight: 500;
      color: #4c4d57;
      line-height: 24px;
      letter-spacing: -0.31px;
      white-space: nowrap;
    }

    /* Headings */
    .form-title {
      font-size: 24px;
      font-weight: 500;
      color: #4c4d57;
      line-height: 32px;
      letter-spacing: 0.07px;
    }

    .form-subtitle {
      font-size: 14px;
      font-weight: 500;
      color: #4c4d57;
      line-height: 20px;
      letter-spacing: -0.15px;
      margin-top: -16px;
    }

    /* Field */
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-label {
      font-size: 14px;
      font-weight: 500;
      color: #4c4d57;
      line-height: 20px;
      letter-spacing: -0.15px;
    }

    .field-input {
      width: 100%;
      height: 40px;
      border: 1px solid #b1b4b7;
      border-radius: 10px;
      padding: 8px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #3d4246;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    .field-input::placeholder {
      color: #8d9094;
    }

    .field-input:focus {
      border-color: #007167;
    }

    /* Button */
    .btn-send {
      width: 100%;
      height: 44px;
      background: #007167;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 24px;
      letter-spacing: -0.31px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-send:hover {
      opacity: 0.9;
    }

    /* Back to login */
    .back-link {
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: #007167;
      line-height: 20px;
      letter-spacing: -0.15px;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <a href="home.html" class="topbar-link">
      <img class="topbar-icon" src="../assets/gd-logo-white.svg" alt="">
      <div class="topbar-divider"></div>
      <span class="topbar-label">Grinding &amp; Dispersing Customer Portal</span>
    </a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT -->
    <div class="panel-left">
      <img class="panel-left-bg" src="../assets/login-bg.png" alt="">
      <div class="panel-left-overlay"></div>
      <div class="panel-left-content">
        <div class="portal-badge">
          <img class="portal-badge-icon" src="../assets/gd-logo-white.svg" alt="">
          <span class="portal-badge-text">G&amp;D Customer Portal</span>
        </div>
        <div class="panel-left-texts">
          <h1 class="panel-left-title">Reset your password</h1>
          <p class="panel-left-subtitle">Enter your registered email, and we'll send you a verification code to help you recover access to your account.</p>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="panel-right">
      <div class="form-wrapper">

        <!-- Logo -->
        <div class="form-logo">
          <img class="form-logo-icon" src="../assets/gd-logo-dark.svg" alt="">
          <span class="form-logo-text">G&amp;D Customer Portal</span>
        </div>

        <!-- Heading -->
        <div>
          <h2 class="form-title">Forgot your password?</h2>
          <p class="form-subtitle" style="margin-top:16px;">We'll send you a code to reset your password.</p>
        </div>

        <!-- Email -->
        <div class="field">
          <label class="field-label" for="email">Email*</label>
          <input class="field-input" id="email" type="email" placeholder="Enter your email" autocomplete="email">
        </div>

        <!-- Send button -->
        <button class="btn-send" type="button" onclick="window.location.href='verify-code.html'">Send verification code</button>

        <!-- Back to login -->
        <a href="login.html" class="back-link">Back to Login</a>

      </div>
    </div>
  </div>

</body>
</html>
